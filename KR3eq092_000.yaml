body:
  text: 精義匯通滋膩妨中運剛烈動內風滋膩如天冬麥冬熟地生地石斛葳蕤人參阿膠百合蜂蜜甘草大棗麻仁文蛤花粉菊花小麥雞黃蠶砂首烏之斂陰剛烈如吳萸丁香川椒乾薑肉桂附子硫黃蒼朮巴豆草果之動陽乃一時救急之藥非常病可久任之品妨中運者以土喜燥而惡濕動內風者以木喜水而憎火也辛熱耗營液溫補實遂絡外感發表辛藥固不可少如麻黃蘇葉葛根升麻羌活之散氣桂枝柴胡荊芥當歸川芎之行血各有奇功誤用耗液多變痙厥內傷托裡溫藥亦未可廢如白朮黃耆飴糖之補脾杜仲菟絲故脂之補腎非無幸中第過用阻絡定患藥癖二者皆能助邪而益病主用者不可不慎苦寒傷生氣咸潤蔽太陽熱在氣分宜甘寒在血分宜苦寒盡人而知據時令言春溫秋燥甘寒用處甚多惟夏外陽內陰則宜苦以燥濕寒以勝熱然胃陽素虛者自不可過投而金匱吐衄篇三黃瀉心湯云治心氣不足西昌謂培生氣而堅臟誠然何醫只知有倒胃之弊哉其藥如大戟甘遂葶藶防己知母大黃黃芩黃連梔子丹皮青黛木通苦參龍膽草鴉膽子之類是苦寒雖有清實熱之益弊與滋膩同不再贅鹹寒如鱉甲蟹殼殭蠶蟬蛻蛇皮蜣螂水蛭蟅蟲海藻紫葳文蛤牡蠣秋石戎鹽人中白肉蓯蓉桑螵蛸元明粉之屬軟堅清燥卻風火攻宿血非無捷效用之過當心陽矇蔽而神明為之不靈精血為之日削矣司命者尤當急知之外感忌酸收內症戒消導酸收如棗仁榴皮五味烏梅訶黎勒罌粟花宣木瓜山茱萸澀可固脫似也設有一毫外感令邪永無出路即系內傷吐血咳嗽之證反致成勞觀仲景用烏梅必用川椒用五味必用乾薑用麥冬必用半夏用棗仁必用川芎其意深矣內傷之證有陽虧於外者有陰虛於內者彼茱萸茯苓澤瀉滑石瞿麥石韋之利溺牽牛芒硝大白大青大黃之滑腸切勿亂投即兼有外感則麻桂發汗瓜蒂皂角探吐更宜酌用傷寒有云亡血家不可發汗瘡家亦不可汗濕家不可下是其例也乃暴病忌參朮黃耆熟地沉疴忌枳朴桃仁山楂亦可類推合觀四節可審用藥之法二妙不盡妙四神亦非神蒼朮黃柏一生一熟偶方中之小劑濕熱證之妙方所以二妙命名究竟治濕重於熱者則妙若熱重濕輕當加入知母地榆較妥而風濕寒濕終非其治也故脂豆蔻吳萸五味四藥合丸治食後脾泄五更腎泄神效殊不知脾腎之泄有命火虛者有肝火熾者徒以為神即有增病速死之神矣可知方書中隨意命方者如八珍十全固本保真之類不得以其名目好看而妄投不計但四君子扶脾誰謂不善以治脾虛可稱君子若遇胃實何異小人蓋方無論平奇要在對證白虎固金佳青龍驅水捷虎嘯風生其熱自平凡火刑肺胃當推白虎第一若火在肝腎即芩連阿膠雞子黃湯白頭翁湯之證治此方未能勝其任胃有實邪粳米又宜減之而小青龍桂枝開天細辛通地復有薑夏麻草溫中以散其外芍藥內助以托其邪面面周到無微不入故洄溪謂為治寒水之神劑發汗利水並可補四逆真武之不逮然溫邪咳嗽誤投必斃大青龍發汗亦然是二法乃一大寒大熱之對子瀉心四逆庶堪比肩理中傷胃脂逍遙劫肝陰理中湯之醒脾逍遙散之疏肝洵為良方然治氣分不足則可若以之治血虛之體是增病而速斃凡方皆利弊相因彼偏用二方者何徒知其利而不計其弊哉牛黃損離火黑錫奪坎水一清心中痰火一攝腎下寒水誠醫家宜備之要藥然備以治倉猝閉證則有無窮之益誤施於久延脫證其害不可勝言蘇合香丸治氣閉大活絡丹治中風損益同此合觀四節可以悟投方之機溫寒須行氣清熱要活血氣滯而後寒積血壅而後熱生行氣如旋覆香附陳皮蔥薤等味加入溫藥隊中以散寒其效倍捷清熱苦寒甘寒鹹寒諸藥大劑寒涼必加入活血之品如桃仁丹皮澤蘭茜草劉寄奴參三七等乃無冰伏熱邪之弊此理本易知惜醫多不識故特表而出之命方良有以製劑豈徒然方有膏丹丸散煎飲湯漬之名各有取義膏取其潤丹取其靈丸取其緩散取其急煎取其下達飲取其中和湯取其味以滌蕩邪氣漬取其氣以留連病所而君臣佐使配合全在分量如小承氣用大黃為君走中下焦血分厚朴為君即變而為中上焦氣分之法陽旦湯桂枝為君走太陽芍藥加倍便入太陰當歸赤小豆散赤豆為君重在敗毒當歸為君重在理血主之佐之輕之重之運用之妙存乎一心立方者詎可忽諸六經提綱仲景傷寒一書乃統治外感之書非專治風寒者也六經分明寒溫疫三證均曉然矣茲録提綱於下曰太陽之為病脈浮頭痛項強而惡寒陽明之為病胃家實是也少陽之為病口苦咽乾目眩耳聾太陰之為病腹痛自利時時嘔吐少陰之為病但欲寐是也厥陰之為病消渴氣上衝胸飢不欲食食則吐蛔下之利不止六字真言無論外感內傷無論出其右者莫六字若也曰表里寒熱虛實三陽為表三陰為里表中之裡陽明是也里中之表少陰是也並各相表裡三陽之腑主表經主裡三陰則心肺主表脾肝腎主裡外感者表宜汗里宜下內傷者表宜清補里宜溫補內傷陽則陰盛陰盛者易感寒內傷陰則陽亢陽亢者易感熱此所謂邪乘虛入也虛為正虛實乃邪實故經云邪氣盛則實精氣奪則虛醫能將此參伍錯綜條分縷晰則亦庶乎其可也六氣便解風風有內外內動之風病於肝治當辛涼外感之風病在肺治當溫散兼寒脈緊兼濕脈弦燥化脈數寒化脈遲本病脈浮寒寒有表裡而表裡各有虛實實者解表宜麻黃湯攻裡宜三物白散虛者固表宜桂枝湯溫里宜四逆湯兼風脈浮兼濕脈沉暑天熱地濕合而成證暑氣當令因時命名邪實脈洪正虛脈濡濕濕有清濁露霧濕傷氣分者曰清潮水濕傷血分者曰濁清宜發汗濁宜利水從燥化則脈急從寒化則脈緩本病脈滑燥燥有虛實虛燥救肺實燥瀉心酸甘涼潤始終正治邪實脈澀正虛脈短火火有陰陽陽火可釜底抽薪陰火宜導龍歸海陽脈有力陰脈無神醫經補正服桂枝湯大汗出脈浮大者與桂枝湯如前法若形如瘧日再發者汗出必解桂枝二麻黃一湯主之脈浮緊者病在表可發汗宜麻黃湯脈浮而數者可發汗宜麻杏甘石湯傷寒脈浮緩身不疼但重乍有輕時無少陰里證者越婢湯主之傷寒脈浮滑此表有熱里有寒白虎加桂枝湯主之寒實結胸無熱證者與三物白散小陷胸湯亦可用傷寒身黃髮熱者麻黃連翹赤小豆湯主之傷寒瘀熱在裡身必發黃梔子柏皮湯主之傷寒心下有水氣咳而微喘發熱不渴小青龍湯主之服湯已渴者此寒去欲解也傷寒脈浮緊無汗發熱身疼痛八九日不解表證仍在此當發其汗麻黃湯主之服藥已微除其人發汗目瞑劇者必衄衄乃解所以然者陽氣重故也傷寒不大便六七日頭痛有熱者與承氣湯小便清者知不在裡當鬚髮汗宜桂枝湯苦頭痛者必衄太陽病寸緩關浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之故也病人不惡寒而但渴者此轉屬陽明也其不可下者小便數者大便必硬不更衣十日無所苦也渴者宜五苓散渴欲飲水者少少與之病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞所以成結胸者以下之太早故也所以成痞者誤下故也金匱云陽毒咽痛吐膿血面赤斑如錦紋升麻鱉甲湯主之陰毒面青如藍靛身痛如被杖升麻鱉甲去雄黃蜀椒主之金匱云病微飲短氣苓桂朮甘湯主之腎氣丸亦主之治病法解一治外感如將意在去其所本無所謂急則治標治內傷如相意在復其所固有所謂緩則治本治心肺如羽藥當從輕治脾胃如衡藥當從平治肝腎如權藥當從重治病法解二古人治外感有汗吐下三法治內傷有溫清和三法其實皆治肺胃也肺寒實則汗之胃寒虛則溫之肺胃虛熱治以清和肺胃實熱治以吐下此至當不易之法時醫不識調理肺胃歸宗脾腎去古遠矣素問摘要臟腑為病者心為噫肺為咳肝為語脾為吞腎為欠為嚏胃為氣逆為噦為恐大小腸為泄下焦溢為水腫膀胱不利為癃閉不約為遺溺膽氣鬱為怒諸病所屬者諸風掉眩皆屬於肝諸寒收引皆屬於腎諸氣膹郁皆屬於肺諸濕腫滿皆屬於脾諸瘡痛癢皆屬於心諸痿喘嘔皆屬於上諸厥固泄皆屬於下諸暴強直皆屬於風諸病水液澄徹清冷皆屬於寒諸嘔吐酸暴注下迫皆屬於熱諸脹腹大諸病有聲按之如鼓諸轉反戾水液渾濁皆屬於熱諸痙項強皆屬於濕諸熱督瘈諸禁鼓栗如喪神守諸病跗腫疼酸驚駭諸逆衝上諸躁狂越皆屬於火四時所病者春善病鼽衄仲夏善病胸脅長夏善病洞泄寒中秋善病風瘧冬善病痹厥此病機之要旨也風淫於內治以辛涼佐以苦甘以甘緩之以酸瀉之寒淫於內治以辛涼佐以甘苦以咸瀉之暑淫於內治以鹹寒佐以苦甘以酸收之濕淫於內治以苦熱佐以酸辛以苦燥之以淡泄之燥淫於內治以苦溫佐以酸辛以苦下之火淫於內治以鹹冷佐以苦甘以酸收之以苦發之此治法之要則也三證合參發熱汗出惡風脈緩者名曰中風惡寒體疼嘔逆脈寸尺俱緊者名曰傷寒此風寒脈證之提綱也分言之六經各有專證各有異脈太陽受病寸尺俱浮陽明受病寸尺俱長少陽受病寸尺俱弦太陰受病寸尺俱細少陰受病寸尺俱弱厥陰受病寸尺俱微而緩故曰脈異太陽汗不出名傷寒汗自出名中風陽明能食為中風不能食為傷寒少陽耳聾目赤胸滿心煩為中風頭痛發熱而脈弦細為傷寒太陰中風手足自溫傷寒自利不渴少陰中風自利而渴傷寒欲吐欲寐厥陰中風舌卷囊縮傷寒飢不欲食故曰證專在三陽脈則浮三陰脈則沉其緩緊遲細則一若浮不緩不緊而滑數沉不細不遲而濡急則即風溫與濕溫之脈再審其證庶無錯誤至於陽證見陰脈陰證見陽脈舍從兩難乃系疫證與寒溫異治矣寒本陰邪何以傷寒證中又有中風溫乃陽邪何以溫證之中又有濕溫要知陰中有陽陽中有陰寒證中傷寒是主中風是賓溫證中風溫是主濕溫是賓濕溫與傷寒相對待風溫與中風相對待而疫則有寒有溫溫疫是其常寒疫是其變知常知變知對待知賓主可與言陰陽互根之理矣彼囿於一偏者不肆用寒涼即概用溫補曾亦思偏寒偏熱之證不多見耶説寒寒最要者表裡二字而表裡中又有兼風兼濕之別風寒病太陽濕寒病太陰伏氣治少陰感冒治少陽第拘標本言少陰太陽司此氣耳余惟太陰亦多至少陽陽明厥陰三經即系寒病每從熱化和解可也當與前六氣參看説溫溫熱之論葉香岩尋其源風濕之分陳平伯溯其流厥後吳氏鞠通祖述葉案而著條辨王氏孟英憲章平伯而纂經緯治溫津梁諸書備已然一則界劃三焦一則伏氣未達智者一失殊為二先生惜今將風濕分兩段持前人言以明其義庶長夜一燈不致盲人摸索風溫吳鞠通曰風有溫有寒風寒之風此風從北方來乃觸發之寒風也最善收引陰盛必傷陽故首郁遏太陽經中之陽氣而為頭痛身熱等證太陽陽腑也傷寒陰邪也陰盛傷人之陽也故曰風寒風溫之風此風從東方來乃解凍之溫風也最善發泄陽盛必傷陰故首郁遏太陰經中之陰氣而為咳嗽自汗口渴頭痛身熱等證太陰陰臟也溫熱陽邪也陽盛傷人之陰也故曰風溫濕溫葉子雨曰濕溫之因有三陽脈濡而弱陰脈小而急此先受暑後中濕乃暑邪蒸濕者是也證見兩脛冷腹滿又胸頭目痛妄言治在足太陰不可發汗由先傷於脾因而中暍濕熱相搏者是也脈濡弱舌苔白或絳底嘔逆口乾不能湯飲胸滿悶身潮熱汗出稍涼少頃又熱此春分後秋分前少陰君火少陽相火太陰濕土三氣合行加以天氣熱下降地氣濕上騰由口鼻吸受著於脾胃者是也誤治變證非一端所能盡夫濕自外來上焦氣分受之潮熱自汗表之不解清之不應宜宣通氣分若冒雨霧濕留太陰肌表發熱自汗不渴不飲舌苔灰白黏膩身雖熱不欲去衣被者宜解肌和表論證不清鮮有不僨事者説疫疫者役也猶徭役之謂多見於旱潦兵燹之餘烈日鬱蒸尸骸之氣與亢勝之氣混合化而為厲毒散漫於天地之間受之者大則一郡一城小則一村一鎮互相傳染所感之因雖同所患之證不一如東坡所論寒濕之疫也東垣所論虛疫也吳又可所論濕熱相搏之疫也余師愚所論暑燥之疫也故劉溫舒素問遺篇有五疫之刺龐安常總病論有五色之治然不可泥也越人五十八難言傷寒有五其中風傷寒濕溫熱病證脈委曲詳盡行在諸經不知何經之動也蓋隨其經所在而取之蓋天地沴厲之氣不可以常理測不得以常法治彼見溫病動手發汗是誤以傷寒法治溫病每遇疫病往往失下則又是以溫病法施治於疫更誤之甚矣辨證發熱寒證發熱惡寒者病發於太陽也無熱惡寒者病發於少陰也溫疫發熱是潮熱非若傷寒壯熱初起間有惡風及次日即口渴畏熱而疫證憎寒壯熱有如疸瘧是已嘔利少陽膽木挾火披猖嘔是上衝利由下迫此謂風溫之嘔利也中虛始利聚飲而嘔此濕溫之嘔利也若夫胃氣不降肺氣不和之嘔利疫多有之蓋或溫或疫凡嘔利者是其邪之出路不可遽止寒病反是諸痛頭痛目痛太陽陽明傷寒者不至側傾難舉溫與疫則頭痛如劈兩目昏瞀勢若難支骨煩疼腰如被杖寒病責在傷陽溫疫責在虧陰肢冷在寒證是腎陽不通在溫證疫證是肝陽不宣所以寒踞少陰與熱伏厥陰有別鼻衄寒證見之是邪氣之將退溫疫見之乃邪氣之正進蓄血寒證當汗不汗熱結膀胱溫疫當下失下火鬱膜原均有此證凡發熱不退小便自利其人如狂而喜忘者皆是治法寒病宜汗者是外感之風寒而中寒則宜溫雖有里證總以先汗後下為是溫病風溫慎汗治當辛涼濕溫禁下治宜苦寒疫病表裡雙解內外分消偏汗偏下兩非所宜指南病證有相類者不可不辨濕從寒化曰痹濕從熱化曰痿中風寒中衰食飲熱中消肌肉厥冒血厥由風氣厥由痰煎厥是風薄厥是熱痛厥是寒蛔厥是濕此風痹痿厥相類而實殊重陽者狂重陰者癲陰陽相搏者癇津液兩虧者痙此癲狂癇痙相類而實殊清不升則嘔濁不降則吐清濁不分則噦營衛不和則噫此嘔吐噦噫相類而實殊氣分六聚痃癖是已血分五積癥瘕是已此癥痃瘕癖相類而實殊虛損宜補精勞瘵宜攻血蠱宜開肺膈宜調胃此蠱膈虛勞各從其類黃疸黃汗濕與風別臟結臟燥寒與熱分咳嗽當別痰飲消渴須分寒水水逆火逆少陰手足不同風溫濕溫太陰手足各異九痛七疝虛實自喜按拒按而定三沖五郁燥濕由善怒多恐而明各門別類毫釐千里醫當辨記勿謂不然審脈浮沉以審表裡之虛實遲數以審臟腑之寒熱大小以審邪氣之進退長短以審正氣之厚薄滑澀以審血氣之盛衰左右以審生克之順逆合望聞問思過半矣此所云者聊舉一隅是在善悟者觸類旁通可耳附遊藝志略營衛血氣也何以內經或云一晝夜五十周於身或云一晝夜一周於身其運行之道生會之理盍詳陳之答曰一陰一陽之謂道有三氣存乎其間譬如陰靜也陽動也所以使其動靜者又一也識此則明三才之指歸知互根之為用矣營主血衛主氣然營血何以能循行經脈衛氣何以能濡潤皮毛蓋血中有氣氣中有血不可斯須之相離此即陰陽互根之理也請參中西之説以證明之西士言食入於胃其精汁有微絲液管吸至頸過肺入心化赤為血由總脈管達下焦散布十二經脈此即行十六丈二尺脈道以應漏水百刻五十度周於身之營血也經言營氣之道內谷為寶谷入於胃乃傳之肺流溢於中布散於外精專者行於經隧常營無已終而復始又言人受氣於谷谷入於胃以傳於肺五臟六腑皆以受氣其清者為營濁者為衛營在脈中衛在脈外周營不休五十而復大會陰陽相貫如環無端者是也人之飲食五味雜投奚能無毒其清者奉心化赤為血其濁者積於胸中隨經脈中之血氣出諸氣街散布周身以衛護陽氣故謂之衛氣西士言血由脈管之尾入微絲血管纏布周身以充膚熱肉其所謂微絲血管者孫絡也微絲血管之血行遍周身漸並漸粗而入回血管回血管者絡脈也血入回血管則其色漸變為紫中含毒氣故也其管兩支一支向上一支向下皆與十二經脈逆順皆行至總回管入心右房由心至肺呼出毒氣吸入生氣其血復變為赤從心左房而入總脈管往來如環晝夜不息經言谷始入胃其精微者先出胃之兩焦以溉五臟別出兩行營衛之道其大氣搏而不行積於胸中命曰氣海者也西士言脈管內其血行速微絲血管內其血行遲查得總脈管內每秒時行十二寸足脈管內每秒時行二寸有奇微絲血管內每分時只行一寸經言衛氣之行一日一夜五十周於身晝日行陽二十五度夜行陰二十五周周於五臟又言衛氣常一日一夜大會於風府日下一節二十一日下至尾骶二十二日入脊內注於伏沖之脈其行九日出於缺盆之中其氣上行者也夫營衛生會篇所謂一日一夜五十度周於身者乃奉心化赤之血由心入總脈管散布三陰三陽之十二經脈行八百十丈脈道之營氣也歲露篇所謂一日一夜行身一周者乃脈管之血氣由三焦氣街出諸孫絡挾陽明悍氣纏布周身充膚熱肉淡滲毫毛之衛氣也營衛生會篇所謂晝行陽二十五度夜行陰二十五度者乃絡脈中之氣血行遍周身漸並漸粗而入絡脈也絡脈有陰陽之分陽絡浮於膚表陰絡沉於肌里皆與十二經脈管交相逆順而行緣人晝則寤寤則動動則陽氣浮故絡脈中之氣血行陽絡者多夜則寐寐則靜靜則陰氣沉故絡脈中之氣血行陰絡者多是皆奉心化赤之血從經脈而行孫絡從孫絡而入絡脈一氣運行循環不息耳然經以清者為營濁者為衛此中界限分劃甚嚴蓋脈管之血色紅既出三焦氣街入孫絡色即兼紫挾陽明悍氣之毒故也入絡脈其紫色較重必待入心出肺呼出此毒氣吸入生氣其血復變為赤落心左房而入脈管是脈管中運行之血氣為營清而無毒也孫絡絡脈中之氣血為衛濁而有毒也學者當知同一榮養百骸之氣血而涇渭分明不容紊亂也明矣其治病大法亦當從茲悟入風寒由毛竅襲入者宜達表由口鼻吸受者宜攻裡沙瘴一證刮則瀉孫絡中之熱毒刺則瀉絡脈中之熱毒故刺出之血紫病輕深紫病重色黑則危蓋暑穢之毒隨陽明悍氣至總脈管入心入心則死矣凡百傷寒溫暑從可類推也若夫歲露篇所謂衛氣之行一日一夜大會於風府日下一節九日而上出缺盆與一日一夜五十度周於身之行度遲速不侔者蓋出三焦氣街入孫絡之氣血纏布周身如日繞天之外故其行遲經脈陰陽逆順偕行絡脈中之氣血如月行地之中故其行速或謂江河窄處水流急寬處水流緩何以脈管闊處血行速而出氣街之氣血挾陽明慓悍之氣何以行遲斯説亦頗近理江河窄處其流急是矣若支派分流則細港淺渠其泄亦迂緩陽明悍慓之氣滑疾是矣若散漫不收其氣亦力弱行遲況億萬分派之微絲血管乎勢分行緩理勢然也雖然此猶日月運行陰陽造化自然之理非知力所能臆度者也衛氣篇黃帝所云亭亭淳淳乎孰能窮之其斯之謂歟外感重病因四時之有伏氣也伏氣不明何療外感張隱菴非不知也惜於反覆辨論中多有詞不達意者繼而王孟英議吳鞠通略伏氣而自強侈談毫無實際願聞其説答曰素問陰陽應象大論曰重陽必陰重陰必陽故曰冬傷於寒春必病溫春傷於風夏生飧泄夏傷於暑秋必痎瘧秋傷於濕冬生咳嗽此四時伏氣之機尤重在重陰必陽重陽必陰八字以明陰陽互根之義也何以言之傷於風者上先受之傷於濕者下先受之風為陽邪陽病者上行極而下是以春傷於風夏生飧泄此重陽必陰也濕為陰邪陰病者下行極而上是以秋傷於濕冬生咳嗽此重陰必陽也冬傷於寒春必病溫者冬至一陽漸生人身之陽熱內盛被嚴寒之氣折伏於肌髓之間至春陽氣盛長伏邪淺者亦可隨春陽之氣漸散伏邪深者或因風寒所遏或為嗜欲所傷伏結之陽氣遇天氣之陽熱兩熱相干發為溫病此重陰必陽也夏傷於暑秋必痎瘧者夏至一陰漸生人身之陰氣內盛暑乃陽邪陽氣外熾則裡氣虛寒加以貪涼飲冷損其真陽至秋陰氣之時內伏陰邪欲出外襲陽暑欲入陰陽相持故發為往來寒熱之痎瘧此重陽必陰也是即伏氣是即外感之源也再求精詳自有子雨之伏氣解在生氣通天論云其生五其氣三何謂也答曰天地陰陽一氣而已自太虛而有太乙之生氣由是動靜焉而陰陽分陰陽分而五行具是五行之生不離夫陰陽之一氣也而經曰其生五其氣三且曰三而成天三而成地三而成人是三氣者天地人之本始也請試明之太極無形靜則為陰動則為陽易曰一陰一陽之為道此一陰一陽非各一之一乃道之妙用而合一之一也惟其合一乃能各一則是其本一而已有三氣存乎其間矣是故動與靜各一也而所以能動靜者又一也由此觀之太乙之所施生造化之所鼓鑄必得三而始能成物氣不得三則無以布於五而五非得三又不能各致夫一也三者一之用五者三之成也故三而成天立天之道曰陰與陽天總陰陽而又積陽以自剛也立地之道曰柔與剛地致柔剛而又積陰以自奠也立人之道曰仁與義然理以宰氣而氣以宰理故人之成也本乎氣交稟天之陽動為氣本地之陰靜為精而有神存乎其間以立性命之基是精氣神三者合而不離所謂三而成人也且太極用此三氣以生五行而五行之生又莫不各用夫三氣試就人之五臟言之心為太陽而主血脈是合陰陽而自為陽也腎為太陰而涵命門真火是合水火而本為陰也肺主制節而水出高源是合金木水以行氣也肝為血海而生一陽以升太衝是合水木火而總於厥陰也脾上承火下涵水以奠乎中火以腐熟水以滋灌而土以歸藏是合水火土而養四臟也故知陰陽之致相待為用陰陽之根互藏其舍而五行之變化皆非一氣偏至之所成蓋一有偏至而合三則無偏至一無鼓動而合三則能鼓動人徒知為三而不知合三而後致夫一也從知生於一而不知用於三而後全夫生也自軒岐指出三氣而造化之妙用始彰故三五與一太上之玄閫養生奧關也三十二難有曰肺白象金肝青象木金得水則沉木得水則浮何以肺浮肝沉樂火樂金其合化之道可得聞乎答曰十干合臟腑甲陽木應膽乙陰木應肝丙陽火應小腸丁陰火應心戊陽土應胃己陰土應脾庚陽金應大腸辛陰金應肺壬陽水應膀胱癸陰水應腎若以五音配五行營土商金角木徵火羽水各因十干之陰陽而分太少也肝屬乙木得水當浮何以反沉然肝雖乙木乙與庚合庚為陽金金性本沉婦當從夫其意樂金而失木之本性故得水反沉也肺屬辛金得水當沉何以反浮然肺雖辛金辛與丙合而為陽火火性炎上婦當從夫其意樂火而失金之本性故得水反浮也生則生氣旺故能合化熟則生氣盡故不能合化所以肝熟而復浮肺熟而復沉乃返本還原也大而言之天地之陰陽小而言之即人倫之夫婦其理一也夫肝屬足厥陰經位乎膈下故行陰道多也肺屬手太陰經位乎膈上故行陽道多也今舉肝肺類推則臟腑陰陽之合化從可會通矣然陰陽之理以和為洽夫婦之道非脅可成合化之義未有明其所以然者雖張隱菴高士宗汪雙池張翼元諸家不以翼軫分疏即用生克定論似是而非支離頗多惟羅淡生內經博議引申天元玉册之義最為曉暢今節録於下岐伯述天元玉册曰太虛寥廓肇基化元萬物資始五運終天布氣真靈總統坤元夫肇基化元而布氣真靈乃云總統於坤元是坤元為萬物之母也坤元既為萬物之母而總統之而天亦必先有以用之也天之十干以戊己居中宮而先用水火然後成於金木豈非總統坤元而以土為首之義乎是以天之御化首以土為甲而甲遂為土仍順布五行於乙丙丁戊之上而以本氣化之土生金金加於乙金生水水加丙水生木木加丁木生火火加戊五行畢再傳而土加於己故甲己合也金加庚故乙庚合也水加丙故丙辛合也木加壬故丁壬合也火加癸故戊癸合也因合而化此一定之理有不可移易者也然本氣之陰陽仍有不能從化而依之以為用者如加陽干為氣有餘加陰乾為氣不足此又因值年以佐用也昔賢論三焦一府紛紛聚訟莫衷一是或謂無形或謂有形或言是一或言是二甚則云為腎傍之脂者雖明如張隱菴亦遊移其詞不能指為何物內經謂上焦如霧中焦如漚下焦如瀆豈虛語哉答曰考臟腑之學西士言之最詳觀全體通考三焦即所謂腹包膜也其膜包繞全腹上通顛頂下行膀胱中有脂膜橫於肝胃之間惟遮陰道護子宮則男女稍異耳或問復包膜即三焦亦有證據否曰觀其包二腸遮兩腎正當七節之間命門部位命門既藏水中真火即為相火之宅居其位行其權此膜即為相火之腑考心肺之下肝胃之上有膈膜一層其形薄如細綱上與心包絡之下面相連下與此膜之上層黏續氣脈通貫則包絡為相火之臟由膈膜上通腦筋即經所云上焦如霧是也中有薄膜兩層包肝裹胃即經所云中焦如漚是也繞膀胱遮陰道以行其氣化即經所云下焦如瀆是也以此證之腹包膜即三焦夫復何疑夫三焦者腎中之脂與膀胱相峙有二白膜通於兩腎貫膂筋由脈管以入心即引心火入腎蒸膀胱之水化而為氣之物也故心火一動相火隨之肝膽屬乎巽三焦包絡屬乎震震為陽木火無體以木為體説卦傳言震為雷為龍雷之火三焦包絡之流行即是火之流行也況以似府外府之大囊配似臟別臟之小囊亦天造地設不可移易者也若求此膜功用全文自有通考在茲不具贅三陽為腑三陰為臟或云心為太陽腎為太陰何也六陽六陰雲手云足或有他意歟其標本之傳變經絡之起止可以曉否答曰陰陽分而天地定其位陰陽交而否泰呈其象陰陽錯綜而後變化見焉萬物之中惟人最靈稟二氣淑德以生故圓其顱方其趾而異於物是以與天地相應陰陽相參者也夫心為手少陰腎為足少陰人所知也心腎系背背為陽臟為陰而心腎皆為陰者五臟繫於背內背雖屬陽其內所包者陰也陽中有陰故能剛柔相濟以成其化蓋身中之定位當如此耳心復為太陽腎復為太陰斯又舍人身而言天地之定位心赤色象火應於南方南方者天地所長養陽之所盛處也則心屬老陽故曰心主太陽矣腎紫色象水應於北方北方者天地所閉藏之域也風寒冰冽則腎屬老陰故曰腎主太陰雖然非有異於手足少陰乎不知其定位既異正陰陽互根之理復何害其不同哉惟施治於病在經脈者即隨經脈所主論治於時令勝復即隨時令所主論治其隨時論治如夏為太陽病當在心則宜視心之受邪與否冬為太陰病當在腎則宜視腎之受邪與否無使逆其時氣心脈不鉤腎脈不石斯生病矣然所投藥餌亦皆入手足少陰非走太陽太陰者尤參伍錯綜之要道焉況心居尊高並於君主有顯明之象腎處卑順比於妾婦屬蟄封藏之本得主太陰太陽者以此心通離卦離為中女實含陰德且蕭邱生寒焰海水成夜磷復為火有出於陰者之明證心得主少陰者又以此也其六陰六陽雲手云足者考經脈篇手太陰肺終手大指次指之端即接手陽明大腸足陽明胃終足大指之端即接足太陰脾手少陰心終手小指之端即接手太陽小腸足太陽膀胱終足小指外側接足少陰腎手厥陰心包終手小指次指之端即接手少陽三焦足少陽膽終足小指次指之間即接足厥陰肝蓋十二經脈雲手云足以行手行足而得名耳豈因足在下屬陰手在上屬陽號為太陽陽明少陽即不當行於足號為太陰少陰厥陰即不當行於陽哉果爾則日陽也設不行寒帶則格林蘭濟諸國無明也可乎月陰也設不行於赤道是蘇門答喇諸國無夜也可乎況三陰之脈起於面三陽之脈起於腹裡更非若手足之比矣亦得謂為錯行乎惟知陰陽相互根即可明乎斯理矣至標本之傳變至真要大論曰少陽太陰從本少陰太陽從標陽明厥陰不從標本從乎中也言邃旨深殊難明曉故自王太僕以下皆未通其意及張戴人始闡發火濕二字介賓張氏又從而引伸之厥義益顯説具類經圖翼中略謂少陽太陰從本以少陽本火而標陽太陰本濕而標陰標本同氣故當從本其不言從中少陽中見木太陰中見土木火共化土金相生也少陰太陽從本從標者以少陰本熱而標陰太陽本寒而標陽標本異氣故或從本或從標亦不言從中少陰之中水太陽之中火同本則異標同標則異本也若陽明厥陰其不從標本從乎中氣者以陽明中濕土是濕從燥化矣厥陰中相火是木從火化矣故不從標本從中氣也傳變則勝復盛衰之道生焉從其化則為常然後生不息逆其化則為變必致災害起如木從火化木具生氣遇火盛而化為炭反無鑽火之功此太過也木失其化木朽火衰亦少出火之質此不及也燥從濕化物雖感濕生乾物含濕必黴壞遂非本性此亦太過也土失其化地薄土濕則五金不能蘊此亦不及也皆標本傳變之理當隨其衰王以消息之是以經言百病之起有生於本者有生於標者有生於中氣者有取本而得者有取標而得者有取中氣而得者有取標本而得者有逆取而得者有從取而得者逆正順也若順逆也又曰人有客氣有同氣有小大不利治其標小大利治其本病發而有餘本而標之先治其本後治其標病發而不足標而本之先治其標後治其本也經言如此要必明知勝復而知百病之害矣經絡之起止者手太陽之脈起於小指少澤至頭之聽宮手陽明起於次指至頭之迎香手少陽起於四指關衝至頭之絲竹空各長五尺六陽經共長三丈手太陰之脈起於胸中中府至大指少商手少陰脈起於胸中極泉至小指少衝手厥陰起於胸中天池至中指中衝各長三尺五寸六陰經共長二丈一尺足太陽之脈起於頭之精明至小指至陰足陽明起於頭之頭維至次指厲兌足少陽起於頭之瞳子髎至四指竅陰各長八尺六陽經共長四丈八尺足太陰之脈起於足大指隱白至胸中大包足少陰起於足心湧泉至胸中俞府足厥陰起足大指大敦至胸中期門各長六尺五寸六陰經共長三丈九尺督脈起於尾閭長強至內唇齦交任脈起於毛際會陰至下唇承漿各長四尺五寸共長九尺蹺脈從足至目內眥各長七尺五寸左右共長一丈五尺都合一十六丈二尺也衝脈起於氣街至胸中而散帶脈起於季脅回身一周維絡於身陽維起於諸陽會陰維起於諸陰交也二脈皆無尺寸之可稽經絡起止盡於是矣八脈者陽蹺陰蹺陽維陰維沖任督帶也蹺者蹺於何經何絡維者維於何經何絡其有形無形可實指其所在乎周氏所論病機體用治法是耶非耶答曰夫十二經脈相為表裡陰陽斯偶前賢論之詳矣顧有偶即有奇大易之象也是故復有奇經者焉沖往督三脈之行經文班班可考帶脈回身一周已可考見惟蹺維二脈起止難詳謹述所得於下焉蹺履也蹺起於足跟故曰蹺維綱也維絡於一身故曰維二十八難曰陽蹺脈者起於跟中循外踝上行入風池陰蹺脈者亦起於跟中循內踝上行至咽喉交貫衝脈陽維陰維者維絡一身溢蓄不能環流灌溉諸經者也故陽維起於諸陽會陰維起於諸陰交蓋陽蹺為足太陽之別故始申脈陰蹺為足少陰之別故始少海二蹺既有行道則不得謂之無形乃絡脈中之氣血行身之左右與少陽厥陰同行諸筋所主然其行不同皆陰出陽而交於足太陽陽入陰而交於足少陰陰陽交互蹺自下而榮於上大會於目此蹺脈有形之證也惟既屬絡脈則豈若正經有一定循行之路其不用丈尺計者以此耳維則越人明言灌溉諸經亦不能究其行度是本非一脈故難悉數雖不曰無形而未可實指所在與蹺脈有行道可考者異也陽維主皮膚之氣行身之表陰維主脂膜之氣行身之裡而陽維以維於諸陽陰維以維諸陰諸陽會諸陰交者督脈陽脈之海也衝脈陰脈之海也陰陽維即起於是何則飲食入胃有無數微絲血管吸其精汁至領會管過肺入心由心下房出總脈管以達於督脈陽維者當起於是沖為血海騰精氣而上積於胸中為宗氣人之五味雜投奚能無毒谷入於胃其精者固化血液而陽明之悍氣不隨精者俱化聚於宗氣之區然後散布周身陰維者當起於是斯皆二維之脈即孫絡故更無行度可計也況蹺脈為病目不瞑諸脈者皆屬於目蹺脈上屬目內眥則蹺脈為絡脈不可證耶維脈為病發寒熱邪在皮膚寒熱乃生經絡居內不當復病寒熱則維為孫絡不又可證耶至周氏所論體用病機治法委曲詳盡先得我心其論桂枝湯之治維病不徇入太陽經之謬説尤卓識也或謂昔人皆有二維脈起止之度如陽維起於少陰而至太陽陰維起於少陽而至厥陰瀕湖李氏載之甚詳何可遽謂孫絡乎斯皆誤會叔和微旨也從少陰斜至太陽少陰心也太陽膀胱也由心生血行於孫絡孫絡纏布周身膀胱主一身之表故以太陽少陰候陽維之脈也從少陽斜至厥陰少陽三焦也厥陰心包也三焦為腹包膜血挾陽明之悍氣出諸氣街而遍周包膜返還入總脈管從心包復歸於心故以少陽厥陰候陰維之脈也且脈絡論列所主病多肌肉痹癢汗出惡風等證雖所刺有陽谷金門僕參客主人承山分肉築賓穴究非一經所主豈一脈而交貫四五經耶素問陽維之脈肉裡之脈者脈氣與太陽少陽相合陽維維諸陽故取太陽少陽泄其邪也即服桂枝湯反煩不解先刺風池風府衛氣行孫絡一日一夜大會於風府故取風府也觀此則維脈屬孫絡明矣如實有可稽何盧華仲景叔和諸書不一稱之哉然絡脈孫絡從未有以比諸蹺維者狂瞽愚論復望高明一為發其聵也傷寒桂枝湯所治之中風與小續命湯所治中風是一是二而金匱防己地黃湯與風引湯所主是異是同但中風一證自有真類之説愈辨愈晦何所取法勞以虛名愈補愈劇何則蠱膨云虛雲實孰是孰非遍察古書有云關格是證有云關格是脈將誰適從溫暑燥濕瘧痢霍亂各有名義其所以然請各抒所見以對答曰中風真類之説始自金元古醫經未之見也類中者即經所謂厥是桂枝湯所治邪居淺者小續命湯所治邪居深者病因無異故藥惟以輕重別之豈若古今録驗續命湯治風熱之痱證而用石膏哉防己地黃治陰虛於內邪並於陽風引治陽實於外邪並於陰病既各異為治是以懸殊脈有損至而後證有虛勞虛曰虛損勞曰勞瘵乃一病而二證概行溫補可乎況有者為實無者為虛虛勞者是非勞力勞心而因逸以致病也故仲景以血痹類為一門痹者閉也所以大黃蟅蟲丸與薯蕷丸為起死之神方女惑男風落山謂之蠱後人云膨因其膚肉腫脹形類乎鼓外實中空而言非膨與蠱有別實指肝言虛指脾言云虛雲實皆是也偏攻偏補非法也內經治以雞矢醴非取金制木木製而土不受木賊運化之機自生乎關格是證覆溢是脈膈乃關格之始格即關膈之終正素問所謂陰陽離決精氣乃絶之敗證蔣寶素有考宜參溫者外寒內熱至春而發之病暑乃天之陽熱下降地之陰濕上騰濕熱互合化而為暑濕重病太陰則曰陰暑熱重病陽明則曰陽暑病暑輕重不同所以又有中傷之分水濕火燥內經謂秋傷於濕言氣之本西昌補秋傷於燥言氣之標春夏地濕則天熱秋冬天寒則地燥燥濕固對待究各有寒化熱化之無定也瘧者言其病之暴瘧而難驟愈其脈自弦可知不弦雖寒熱往來猶非瘧痎瘧溫瘧疸瘧瘴瘧為證不一治不如法有三患戕脾元則成瘧鼓蓄肝血則成瘧母耗腎陰則成瘧勞無犯三患則無論痰瘧食瘧牡瘧自隨手奏效痢因欲利不得利其病在利故曰痢有虛實有寒熱桃花湯非治虛寒者乎白頭翁湯非治實熱者乎由此類推治法可思矣霍亂是陰陽淆亂如雨聲霍霍而暴注下迫也屬寒者固多屬熱者亦常見但須刻刻顧慮其脾胃耳因寒宜理中四逆故薑附不嫌其熱因熱宜白虎天水則膏滑不嫌其寒若救陰當於大劑參朮中佐以牡蠣白芍轉筋宜在扶持脾胃參用蜘蛛散以抑風木審因察證活法運乎一心不可泥執一家之言而僨事也
