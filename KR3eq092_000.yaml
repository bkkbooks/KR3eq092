front:
  text: 序豫友玉刪寶君姿性傑出好讀書而尤致力於醫醫書無所不窺凡岐軒方術與夫古今名家諸集皆能潛心考究默尋指歸如此者亦有年其間或有因疑得悟因悟得解者爰撮其大要著為論説名之曰醫醫小草豫周覽一過竊嘆寶君此書能發前人之所未發補古人之所不逮使非洞明乎五運六氣之機緘七情九候之異同以及臟腑虛實經絡源流陰陽變化氣血周轉而又方藥爛熟臨症甚多安能如是之精審詳備不滋遺議也乎籲博學詳説盡宣醫學之奧使天下後世凡業醫者皆有所依據寶君方功誠匪淺矣豫少與君同學備悉君之天姿英敏立志甚大而鋭自離群而後豫雖稍稍涉獵方書亦欲以術活人而著述之事自漸固陋謝未能也今讀醫醫小草深幸寶君既能醫世又能醫醫行見此書之不脛而走遂不計辭之工拙樂而為之序云光緒二十有七年歲次辛丑季夏初吉硯愚弟春云倬清甫拜敘序醫之難能也孫氏思邈其知之乎孫氏之著千金要方也曰凡欲為大醫者必諳靈素甲乙明堂流注本草藥對以及仲景叔和阮範張靳諸部經方又須妙解陰陽祿命諸家相法灼龜五兆周易六壬若不爾者如無目夜遊動致顛隕豈不以醫之道通乎造化與陰陽五行相消息不如是不足盡醫之能事哉今之世距唐遠矣孫氏所言諸術不盡傳諸經方亦多不可見然自唐以來千餘年間以醫名者數十人此數十人者又各有所論著以成一家之言雖其中是非雜出要莫不即其生平辛苦所僅獲者掬而告諸萬世自今觀之南北燥濕不同古今稟賦亦異執其一説或且足以殺人然則欲應無窮之變而不窘於所施不可不廣覽博採以待一日之用明矣顧今之懸壺者流略識藥性請者造門如內難傷寒金匱諸書不一寓目遑問其他晚近人情樂簡易而惡繁重大抵然也有本其師説與其平日揣摩而有得者約舉以相示不可謂非仁人之用心而希捷獲者之所甚便然則玉珊是書之刻其亦有不容已者乎余與玉珊遇於維揚書肆中非素相識也聞余購夏氏奇疾方未獲慨然出其家藏本假鈔因以是書屬序觀玉珊之先施於朋友如此其於療疾處方又何如耶書二種號醫醫小草一卷遊藝志略一卷玉珊富於年異日讀書愈多研理愈深吾知其所撰述較今必更有進也望江何聲煥頓首拜序序寶子玉珊余世好也卓犖有大志而酷嗜醫少時讀靈素玉函諸經有神悟若熟識者其談醫則按病施治毫無難色余尚不之信適余患溫病十餘日數易醫矣玉珊為出一方投之立效始信玉珊之有得於醫為不誣云然余究惜玉珊之自小其志而未觀於讀書致用之大也而玉珊則視棄舉之業如棄敝屣以為從事占䯏規規於記誦詞章之末即幸獲一第亦復於世何裨是則玉珊之牢騷鬱抑因托於醫以自見者歲丙申余治裝北上赴部供職而玉珊亦於是歲出遊由是天各一方幾及四年旋余以讀禮家居就館於鄂之撫署季夏假歸玉珊亦先於前月旋里握手道故歡逾平生出所著易知録醫藉選遊藝志略夜談隨記各種而請序於余余固不能辭惜余少究心岐黃未識玉珊醫術果能闡內經之奧旨窺仲聖之祕蘊否但自玉珊之立意言之亦若懲世之庸醫殺人而有所不得已者則以是延頸翹首而望之曰玉珊之書其傳矣乎是為序光緒庚子立秋之後一日前工部主事愚小兄迎喜雨亭甫識自序醫學之難難於無偏無偏者仲景一人而已厥後方書汗牛棟以偏得名者莫勝於金元如子和偏攻丹溪偏補河間偏涼東垣偏溫入主出奴愈趨愈下而學古者泥古執一家言妄辨得失非偏於寒證治法即偏於溫證疫證治法殊不知寒溫疫三證包括者廣推之霍亂瘧痢吐血咳嗽莫不各有斯三者是三證明而諸外感證自迎刃而解何偏之有夫醫本全生術耳今習是術者全生適足以傷生蓋欲人之生者是其心速人之死者是其術無他醫庸故也天下多一明醫而所全者衆少一庸醫而所全者更衆茲編其欲化庸醫為明醫俾使融會三者同歸於無偏而後已未始非救偏之一助乎光緒辛丑夏仲西園居士撰於輔文書院之南軒遊藝志略自序余自從朱爻生習醫後在皖南遇一友周君潛初也在揚州遇一師葉君子雨也余川廣閩浙足迹所經知音者希竊以不明營衛血脈難通不明三焦氣化何識勞瘵人只知虛而不知實蠱脹人只知實而不知虛霍亂第知其為寒消渴第知其為熱而不知凡病各有寒熱虛實偏則多弊余不揣譾陋謹將得諸師友者都為一卷以公同好顏曰遊藝志略蓋持藝以遊遊愈遠而藝愈進聊以備救弊補偏之一助敢著述云乎哉然亦僅可為知者道也光緒二十七年歲次辛丑仲夏月兩湖釣叟自記
